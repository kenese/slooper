<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Slooper Dev Controller</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #111418;
            --panel: #1b2026;
            --panel-soft: #222932;
            --text: #f3f5f7;
            --muted: #a8b0ba;
            --accent: #55c7a3;
            --accent-hot: #c7f86f;
            --danger: #f06969;
            --line: #343c47;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        main {
            width: min(920px, calc(100vw - 32px));
            margin: 0 auto;
            padding: 28px 0;
        }

        header {
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 18px;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0;
        }

        .status {
            color: var(--muted);
            font-size: 14px;
            text-align: right;
        }

        .channels {
            display: grid;
            gap: 18px;
        }

        .channel {
            display: grid;
            gap: 10px;
        }

        .channel-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .channel-head .status {
            max-width: 520px;
        }

        .slots {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }

        .slot,
        .transport,
        .input-routing,
        .tempo {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            padding: 14px;
        }

        .slot-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }

        h2 {
            margin: 0;
            font-size: 18px;
            letter-spacing: 0;
        }

        .pill {
            min-width: 96px;
            border-radius: 999px;
            padding: 6px 10px;
            background: var(--panel-soft);
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
            text-align: center;
        }

        .pill.pending,
        .pill.playing,
        .pill.recording {
            color: #07120e;
            background: var(--accent);
        }

        .pill.stopped {
            color: #1b1005;
            background: #e5b65f;
        }

        .readout {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
            margin-bottom: 12px;
            color: var(--muted);
            font-size: 13px;
        }

        .readout strong {
            display: block;
            color: var(--text);
            font-size: 16px;
            margin-top: 2px;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 8px;
        }

        button {
            min-height: 48px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel-soft);
            color: var(--text);
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }

        button:hover {
            border-color: var(--accent);
        }

        button:active {
            transform: translateY(1px);
        }

        button.primary {
            grid-column: span 4;
            min-height: 72px;
            background: var(--accent);
            color: #07120e;
            font-size: 18px;
        }

        button.danger {
            color: #2a0808;
            background: var(--danger);
        }

        .transport {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-top: 14px;
        }

        .transport button {
            min-width: 180px;
        }

        .input-routing {
            margin-bottom: 14px;
        }

        .tempo {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 14px;
            margin-bottom: 14px;
        }

        .beat-light {
            width: 46px;
            aspect-ratio: 1;
            border-radius: 50%;
            border: 1px solid var(--line);
            background: var(--panel-soft);
            box-shadow: inset 0 0 0 8px rgba(255, 255, 255, 0.03);
        }

        .beat-light.clock-flash {
            background: var(--accent-hot);
            border-color: var(--accent-hot);
            box-shadow: 0 0 22px rgba(199, 248, 111, 0.6);
        }

        .tempo-readout {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
            color: var(--muted);
            font-size: 13px;
        }

        .tempo-readout strong {
            display: block;
            color: var(--text);
            font-size: 16px;
            margin-top: 2px;
        }

        .beat-bar {
            height: 8px;
            border-radius: 999px;
            background: var(--panel-soft);
            overflow: hidden;
        }

        .beat-bar-fill {
            width: 0;
            height: 100%;
            background: var(--accent);
        }

        .input-routing-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }

        .source-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 8px;
        }

        button.selected {
            background: var(--accent);
            color: #07120e;
        }

        @media (max-width: 720px) {
            header,
            .transport,
            .input-routing-head,
            .tempo {
                align-items: stretch;
                flex-direction: column;
            }

            .tempo {
                display: flex;
            }

            .status {
                text-align: left;
            }

            .slots {
                grid-template-columns: 1fr;
            }

            .transport button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<main>
    <header>
        <h1>Slooper Dev Controller</h1>
        <div class="status" id="connection">Connecting...</div>
    </header>

    <section class="input-routing" id="input-routing"></section>

    <section class="tempo" id="tempo-panel">
        <div class="beat-light" id="beat-light"></div>
        <div>
            <h2>Tempo</h2>
            <div class="beat-bar"><div class="beat-bar-fill" id="beat-bar-fill"></div></div>
        </div>
        <div class="tempo-readout">
            <div>Source<strong id="tempo-source">None</strong></div>
            <div>BPM<strong id="tempo-bpm">--</strong></div>
            <div>Beat<strong id="tempo-beat">--</strong></div>
        </div>
    </section>

    <section class="channels" id="slots"></section>

    <section class="transport">
        <div>
            <h2>Monitor</h2>
            <div class="status" id="monitor-status">Off</div>
        </div>
        <button id="monitor-button" type="button">Toggle Monitor</button>
        <button type="button" data-action="tapTempo">Tap Tempo</button>
    </section>
</main>

<script>
    const stateNames = ['Empty', 'Recording', 'Playing', 'Stopped', 'Pending'];
    let appState = null;
    let tempoView = null;
    let tempoAnimationFrame = null;
    let beatFlashTimeout = null;
    let beatFlashOffTimeout = null;
    let ws = null;
    let wsReconnectDelay = 1000;
    let wsReconnectTimer = null;

    async function request(path, options = {}) {
        const response = await fetch(path, {
            headers: { 'Content-Type': 'application/json' },
            ...options,
        });

        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Request failed');
        return data;
    }

    async function action(actionName, slot) {
        try {
            await request('/api/action', {
                method: 'POST',
                body: JSON.stringify({ action: actionName, slot }),
            });
        } catch (err) {
            document.getElementById('connection').textContent = err.message;
        }
    }

    function tapLabel(slot) {
        if (slot.state === 0) return 'Record';
        if (slot.state === 1) return 'Stop Rec + Play';
        if (slot.state === 2) return 'Stop';
        if (slot.state === 4) return 'Pending';
        return 'Resume';
    }

    function signed(value) {
        const rounded = wholeMs(value);
        return `${rounded >= 0 ? '+' : ''}${rounded}`;
    }

    function wholeMs(value) {
        return Math.round(Number(value) || 0);
    }

    function groupSlotsByChannel(slots) {
        return slots.reduce((groups, slot) => {
            const key = String(slot.channelId || 1);
            groups[key] = groups[key] || [];
            groups[key].push(slot);
            return groups;
        }, {});
    }

    function renderChannelRouteLabel(channelId, state) {
        const channel = (state.channels || []).find((item) => String(item.id) === String(channelId));
        if (!channel || !channel.inputLabel || !channel.outputLabel) {
            const slotCount = groupSlotsByChannel(state.slots)[channelId].length;
            return `${slotCount} slots`;
        }
        return `Channel ${channelId} uses ${channel.inputLabel} and ${channel.outputLabel}`;
    }

    function renderSlot(slot) {
        const stateLabel = slot.stateLabel || stateNames[slot.state] || 'Empty';
        const stateClass = stateLabel.toLowerCase();
        const startCrop = slot.startCropOffset || 0;
        const endCrop = slot.endCropOffset ?? slot.cropOffset ?? 0;
        const slotName = slot.name || `Slot ${slot.id}`;
        return `
            <article class="slot">
                <div class="slot-head">
                    <h2>${slotName}</h2>
                    <div class="pill ${stateClass}">${stateNames[slot.state]}</div>
                </div>
                <div class="readout">
                    <div>Loop<strong>${wholeMs(slot.currentLengthMs)} ms</strong></div>
                    <div>Start Crop<strong>${signed(startCrop)} ms</strong></div>
                    <div>End Crop<strong>${signed(endCrop)} ms</strong></div>
                </div>
                <div class="controls">
                    <button class="primary" type="button" data-action="tap" data-slot="${slot.id}">${tapLabel(slot)}</button>
                    <button type="button" data-action="autoLoop:1beat" data-slot="${slot.id}">1 Beat</button>
                    <button type="button" data-action="autoLoop:2beat" data-slot="${slot.id}">2 Beat</button>
                    <button type="button" data-action="autoLoop:4beat" data-slot="${slot.id}">4 Beat</button>
                    <button type="button" data-action="autoLoop:2bar" data-slot="${slot.id}">2 Bar</button>
                    <button type="button" data-action="half" data-slot="${slot.id}">Half</button>
                    <button type="button" data-action="double" data-slot="${slot.id}">Double</button>
                    <button type="button" data-action="cropStartDown" data-slot="${slot.id}">Start -30</button>
                    <button type="button" data-action="cropStartUp" data-slot="${slot.id}">Start +30</button>
                    <button type="button" data-action="cropDown" data-slot="${slot.id}">End -30</button>
                    <button type="button" data-action="cropUp" data-slot="${slot.id}">End +30</button>
                    <button type="button" data-action="moveDown" data-slot="${slot.id}">Move -30</button>
                    <button type="button" data-action="moveUp" data-slot="${slot.id}">Move +30</button>
                    <button type="button" data-action="reset" data-slot="${slot.id}">Reset</button>
                    <button class="danger" type="button" data-action="clear" data-slot="${slot.id}">Clear</button>
                </div>
            </article>
        `;
    }

    function renderChannels(state) {
        const slots = state.slots.map((slot) => slot);
        const groups = groupSlotsByChannel(slots);
        return Object.entries(groups).map(([channelId, channelSlots]) => `
            <section class="channel">
                <div class="channel-head">
                    <h2>Channel ${channelId}</h2>
                    <div class="status">${renderChannelRouteLabel(channelId, state)}</div>
                </div>
                <div class="slots">
                    ${channelSlots.map(renderSlot).join('')}
                </div>
            </section>
        `).join('');
    }

    function renderInputRouting(state) {
        if (state.channels && state.channels.length > 1) {
            return '';
        }

        const inputRouting = state.inputRouting;
        if (!inputRouting || inputRouting.sources.length === 0) {
            return '';
        }

        const modeLabel = inputRouting.mode === 'switching'
            ? 'Switching'
            : 'Send Mode';
        const selectedSource = inputRouting.sources.find((source) => source.id === inputRouting.selectedSourceId)
            || inputRouting.sources[0];

        return `
            <div class="input-routing-head">
                <div>
                    <h2>Input Source</h2>
                    <div class="status">${modeLabel} · ${selectedSource.label}</div>
                </div>
                <div class="pill ${inputRouting.mode === 'switching' ? 'playing' : ''}">${modeLabel}</div>
            </div>
            <div class="source-buttons">
                ${inputRouting.sources.map((source) => `
                    <button
                        type="button"
                        class="${source.id === inputRouting.selectedSourceId ? 'selected' : ''}"
                        data-action="source:${source.id}"
                    >${source.label}</button>
                `).join('')}
            </div>
        `;
    }

    function clearTempoTimers() {
        if (tempoAnimationFrame !== null) {
            cancelAnimationFrame(tempoAnimationFrame);
            tempoAnimationFrame = null;
        }

        if (beatFlashTimeout !== null) {
            clearTimeout(beatFlashTimeout);
            beatFlashTimeout = null;
        }

        if (beatFlashOffTimeout !== null) {
            clearTimeout(beatFlashOffTimeout);
            beatFlashOffTimeout = null;
        }
    }

    function flashBeatLight() {
        const light = document.getElementById('beat-light');
        light.classList.add('clock-flash');

        if (beatFlashOffTimeout !== null) {
            clearTimeout(beatFlashOffTimeout);
        }

        beatFlashOffTimeout = setTimeout(() => {
            light.classList.remove('clock-flash');
            beatFlashOffTimeout = null;
        }, 90);
    }

    function animateTempoProgress() {
        if (!tempoView) return;

        const beat = document.getElementById('tempo-beat');
        const bar = document.getElementById('beat-bar-fill');
        const elapsedBeatMs = (Date.now() - tempoView.beatStartMs) % tempoView.beatMs;
        const progress = Math.max(0, Math.min(1, elapsedBeatMs / tempoView.beatMs));

        beat.textContent = `${Math.round(progress * 100)}%`;
        bar.style.width = `${progress * 100}%`;
        tempoAnimationFrame = requestAnimationFrame(animateTempoProgress);
    }

    function scheduleBeatFlash(tempo, receivedAtMs = Date.now()) {
        if (beatFlashTimeout !== null) {
            clearTimeout(beatFlashTimeout);
            beatFlashTimeout = null;
        }

        const beatMs = Number(tempo.beatMs);
        if (!Number.isFinite(beatMs) || beatMs <= 0) return;

        const beatStartMs = Number(tempo.lastBeatTimeMs);
        if (!Number.isFinite(beatStartMs)) return;
        tempoView = { beatMs, beatStartMs };

        const elapsedBeatMs = (receivedAtMs - beatStartMs) % beatMs;

        function scheduleNextFlash(delayMs) {
            beatFlashTimeout = setTimeout(() => {
                flashBeatLight();
                scheduleNextFlash(beatMs);
            }, Math.max(0, delayMs));
        }

        let delayMs = beatMs - elapsedBeatMs;
        if (delayMs <= 16) {
            flashBeatLight();
            delayMs += beatMs;
        }
        scheduleNextFlash(delayMs);

        if (tempoAnimationFrame === null) {
            tempoAnimationFrame = requestAnimationFrame(animateTempoProgress);
        }
    }

    function renderTempo(tempo) {
        const source = document.getElementById('tempo-source');
        const bpm = document.getElementById('tempo-bpm');
        const beat = document.getElementById('tempo-beat');
        const light = document.getElementById('beat-light');
        const bar = document.getElementById('beat-bar-fill');

        if (!tempo || !tempo.active) {
            source.textContent = 'None';
            bpm.textContent = '--';
            beat.textContent = '--';
            bar.style.width = '0%';
            light.classList.remove('clock-flash');
            tempoView = null;
            clearTempoTimers();
            return;
        }

        const label = tempo.source === 'midi' ? 'MIDI Clock' : 'Tap';
        const progress = Math.max(0, Math.min(1, Number(tempo.beatProgress) || 0));
        source.textContent = label;
        bpm.textContent = Number(tempo.bpm).toFixed(1);
        beat.textContent = `${Math.round(progress * 100)}%`;
        bar.style.width = `${progress * 100}%`;
        scheduleBeatFlash(tempo);
    }

    function render() {
        if (!appState) return;
        document.getElementById('input-routing').innerHTML = renderInputRouting(appState);
        document.getElementById('slots').innerHTML = renderChannels(appState);
        renderTempo(appState.tempo);
        document.getElementById('monitor-status').textContent =
            appState.monitorEnabled ? (appState.monitorActive ? 'On' : 'Muted while loop plays') : 'Off';
        document.getElementById('monitor-button').textContent =
            appState.monitorEnabled ? 'Turn Monitor Off' : 'Turn Monitor On';
        document.getElementById('connection').textContent = ws && ws.readyState === WebSocket.OPEN ? 'Connected' : 'Reconnecting…';
    }

    document.addEventListener('mousedown', (event) => {
        const button = event.target.closest('button[data-action]');
        if (!button) return;
        action(button.dataset.action, Number(button.dataset.slot));
    });

    document.getElementById('monitor-button').addEventListener('mousedown', () => action('monitor'));

    function connectWebSocket() {
        if (wsReconnectTimer !== null) {
            clearTimeout(wsReconnectTimer);
            wsReconnectTimer = null;
        }

        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${protocol}//${location.host}`);

        ws.onopen = () => {
            wsReconnectDelay = 1000;
            document.getElementById('connection').textContent = 'Connected';
        };

        ws.onmessage = (event) => {
            try {
                appState = JSON.parse(event.data);
                render();
            } catch (_) {}
        };

        ws.onclose = () => {
            ws = null;
            document.getElementById('connection').textContent = 'Reconnecting…';
            wsReconnectTimer = setTimeout(connectWebSocket, wsReconnectDelay);
            wsReconnectDelay = Math.min(10000, wsReconnectDelay * 2);
        };

        ws.onerror = () => ws.close();
    }

    connectWebSocket();
</script>
</body>
</html>
