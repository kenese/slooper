<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Slooper Dev Controller</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #111418;
            --panel: #1b2026;
            --panel-soft: #222932;
            --text: #f3f5f7;
            --muted: #a8b0ba;
            --accent: #55c7a3;
            --danger: #f06969;
            --line: #343c47;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        main {
            width: min(920px, calc(100vw - 32px));
            margin: 0 auto;
            padding: 28px 0;
        }

        header {
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 18px;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0;
        }

        .status {
            color: var(--muted);
            font-size: 14px;
            text-align: right;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }

        .slot,
        .transport {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            padding: 14px;
        }

        .slot-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }

        h2 {
            margin: 0;
            font-size: 18px;
            letter-spacing: 0;
        }

        .pill {
            min-width: 96px;
            border-radius: 999px;
            padding: 6px 10px;
            background: var(--panel-soft);
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
            text-align: center;
        }

        .pill.playing,
        .pill.recording {
            color: #07120e;
            background: var(--accent);
        }

        .pill.stopped {
            color: #1b1005;
            background: #e5b65f;
        }

        .readout {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
            margin-bottom: 12px;
            color: var(--muted);
            font-size: 13px;
        }

        .readout strong {
            display: block;
            color: var(--text);
            font-size: 16px;
            margin-top: 2px;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 8px;
        }

        button {
            min-height: 48px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel-soft);
            color: var(--text);
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }

        button:hover {
            border-color: var(--accent);
        }

        button:active {
            transform: translateY(1px);
        }

        button.primary {
            grid-column: span 4;
            min-height: 72px;
            background: var(--accent);
            color: #07120e;
            font-size: 18px;
        }

        button.danger {
            color: #2a0808;
            background: var(--danger);
        }

        .transport {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-top: 14px;
        }

        .transport button {
            min-width: 180px;
        }

        @media (max-width: 720px) {
            header,
            .transport {
                align-items: stretch;
                flex-direction: column;
            }

            .status {
                text-align: left;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .transport button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<main>
    <header>
        <h1>Slooper Dev Controller</h1>
        <div class="status" id="connection">Connecting...</div>
    </header>

    <section class="grid" id="slots"></section>

    <section class="transport">
        <div>
            <h2>Monitor</h2>
            <div class="status" id="monitor-status">Off</div>
        </div>
        <button id="monitor-button" type="button">Toggle Monitor</button>
    </section>
</main>

<script>
    const stateNames = ['Empty', 'Recording', 'Playing', 'Stopped'];
    let appState = null;

    async function request(path, options = {}) {
        const response = await fetch(path, {
            headers: { 'Content-Type': 'application/json' },
            ...options,
        });

        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Request failed');
        return data;
    }

    async function action(actionName, slot) {
        try {
            appState = await request('/api/action', {
                method: 'POST',
                body: JSON.stringify({ action: actionName, slot }),
            });
            render();
        } catch (err) {
            document.getElementById('connection').textContent = err.message;
        }
    }

    function tapLabel(slot) {
        if (slot.state === 0) return 'Record';
        if (slot.state === 1) return 'Stop Rec + Play';
        if (slot.state === 2) return 'Stop';
        return 'Resume';
    }

    function signed(value) {
        const rounded = wholeMs(value);
        return `${rounded >= 0 ? '+' : ''}${rounded}`;
    }

    function wholeMs(value) {
        return Math.round(Number(value) || 0);
    }

    function renderSlot(slot) {
        const stateClass = slot.stateLabel.toLowerCase();
        const startCrop = slot.startCropOffset || 0;
        const endCrop = slot.endCropOffset ?? slot.cropOffset ?? 0;
        return `
            <article class="slot">
                <div class="slot-head">
                    <h2>Slot ${slot.id}</h2>
                    <div class="pill ${stateClass}">${stateNames[slot.state]}</div>
                </div>
                <div class="readout">
                    <div>Loop<strong>${wholeMs(slot.currentLengthMs)} ms</strong></div>
                    <div>Start Crop<strong>${signed(startCrop)} ms</strong></div>
                    <div>End Crop<strong>${signed(endCrop)} ms</strong></div>
                </div>
                <div class="controls">
                    <button class="primary" type="button" data-action="tap" data-slot="${slot.id}">${tapLabel(slot)}</button>
                    <button type="button" data-action="cropStartDown" data-slot="${slot.id}">Start -30</button>
                    <button type="button" data-action="cropStartUp" data-slot="${slot.id}">Start +30</button>
                    <button type="button" data-action="cropDown" data-slot="${slot.id}">End -30</button>
                    <button type="button" data-action="cropUp" data-slot="${slot.id}">End +30</button>
                    <button type="button" data-action="moveDown" data-slot="${slot.id}">Move -30</button>
                    <button type="button" data-action="moveUp" data-slot="${slot.id}">Move +30</button>
                    <button type="button" data-action="reset" data-slot="${slot.id}">Reset</button>
                    <button class="danger" type="button" data-action="clear" data-slot="${slot.id}">Clear</button>
                </div>
            </article>
        `;
    }

    function render() {
        if (!appState) return;
        document.getElementById('slots').innerHTML = appState.slots.map(renderSlot).join('');
        document.getElementById('monitor-status').textContent =
            appState.monitorEnabled ? (appState.monitorActive ? 'On' : 'Muted while loop plays') : 'Off';
        document.getElementById('monitor-button').textContent =
            appState.monitorEnabled ? 'Turn Monitor Off' : 'Turn Monitor On';
        document.getElementById('connection').textContent = 'OSC -> 127.0.0.1:9000';
    }

    document.addEventListener('mousedown', (event) => {
        const button = event.target.closest('button[data-action]');
        if (!button) return;
        action(button.dataset.action, Number(button.dataset.slot));
    });

    document.getElementById('monitor-button').addEventListener('mousedown', () => action('monitor'));

    request('/api/state')
        .then((state) => {
            appState = state;
            render();
        })
        .catch((err) => {
            document.getElementById('connection').textContent = err.message;
        });
</script>
</body>
</html>
